<!--
  .storybook/preview-head.html  Custom HTML for the Storybook preview (story) frame

  This file injects extra tags into the <head> of the iframe that renders
  each story.  Without a viewport meta tag the iframe defaults to a fixed
  desktop width inside a phone browser, which can cause story content to
  overflow or appear blank.
-->
<meta name="viewport" content="width=device-width, initial-scale=1" />
