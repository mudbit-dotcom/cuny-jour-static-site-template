<!--
  .storybook/manager-head.html  Custom HTML for the Storybook manager frame

  This file injects extra tags into the <head> of the Storybook manager UI
  (the sidebar, toolbar, and canvas wrapper that surrounds each story).

  Adding the viewport meta tag ensures the manager renders at the correct
  width on mobile devices, so the canvas area is visible and usable on phones.
-->
<meta name="viewport" content="width=device-width, initial-scale=1" />
